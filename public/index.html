<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — QMS</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand-mark"><span class="dot"></span> QMS — Quality Management</div>
      <h1>Sign in</h1>
      <p class="sub">Access your quality management workspace.</p>

      <div id="msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" required autocomplete="current-password" />
        </div>
        <button class="btn" type="submit">Sign in</button>
      </form>

      <p class="muted-link">Don't have an account? <a href="/signup.html">Create one</a></p>
    </div>
  </div>

  <script type="module">
    import { signIn, auth, onAuthStateChanged } from "/js/auth.js";

    onAuthStateChanged(auth, (u) => { if (u) window.location.href = "/dashboard.html"; });

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "";
      try {
        await signIn(form.email.value.trim(), form.password.value);
        window.location.href = "/dashboard.html";
      } catch (err) {
        msg.innerHTML = `<div class="msg error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
