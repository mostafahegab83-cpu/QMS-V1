<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up — Manage Easily App</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <main class="login-wrap">
    <div class="login-frame">
      <div class="card">
        <header class="card-head">
          <h1>Create your account</h1>
          <p>Start managing your quality workspace</p>
        </header>
        <form class="card-body" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
          <div class="field"><label for="name">Full name</label><input id="name" type="text" required /></div>
          <div class="field"><label for="email">Email</label><input id="email" type="email" required /></div>
          <div class="field"><label for="password">Password</label><input id="password" type="password" required /></div>
          <button type="submit" class="btn-primary">Sign up</button>
          <p class="muted center">Already have an account? <a href="index.html">Sign in</a></p>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
