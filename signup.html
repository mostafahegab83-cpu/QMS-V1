<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — QMS</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand-mark"><span class="dot"></span> QMS — Quality Management</div>
      <h1>Create account</h1>
      <p class="sub">New accounts default to the Employee role.</p>

      <div id="msg"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input id="fullName" type="text" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password (min. 6 characters)</label>
          <input id="password" type="password" required minlength="6" autocomplete="new-password" />
        </div>
        <button class="btn" type="submit">Create account</button>
      </form>

      <p class="muted-link">Already have an account? <a href="./index.html">Sign in</a></p>
    </div>
  </div>

  <script type="module">
    import { signUp } from "./js/auth.js";
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "";
      try {
        await signUp(form.email.value.trim(), form.password.value, form.fullName.value.trim());
        window.location.href = "./dashboard.html";
      } catch (err) {
        msg.innerHTML = `<div class="msg error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
